name: tts_with_local_notif
description: Talkative - A Flutter calendar and notification app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^17.2.2
  rxdart: ^0.27.7
  device_info_plus: ^10.1.0
  path_provider: ^2.1.3
  http: ^1.2.1
  sqflite: ^2.3.3
  intl: ^0.19.0
  table_calendar: ^3.1.2
  path: ^1.9.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  platform: ^3.1.0

flutter:
  uses-material-design: true

flutter_icons:
  android: "logo_icon"
  ios: true
  image_path: "assets/logo.png"
